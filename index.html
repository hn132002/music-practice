<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂理強化練習 - 鍵盤亂序版</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        .step-label { color: #3498db; font-weight: bold; font-size: 1.1em; }
        .instruction { font-size: 1em; color: #555; margin: 10px 0; min-height: 1.2em; }
        .notes-display { font-size: 2.5em; font-weight: bold; margin: 15px 0; padding: 15px; background: #f9f9f9; border: 2px dashed #ddd; border-radius: 12px; cursor: pointer; }
        .input-container { display: flex; justify-content: center; gap: 10px; margin: 15px 0; }
        .input-slot { width: 60px; height: 50px; border-bottom: 3px solid #bdc3c7; font-size: 1.5em; font-weight: bold; display: flex; align-items: center; justify-content: center; color: #2c3e50; }
        .input-slot.filled { border-bottom-color: #3498db; color: #3498db; }
        .ans-text { font-size: 1.8em; color: #27ae60; font-weight: bold; margin-bottom: 15px; min-height: 1.2em; visibility: hidden; }
        .keyboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .key { padding: 15px 5px; background: #fff; border-radius: 10px; font-weight: bold; cursor: pointer; border: 2px solid #ecf0f1; transition: 0.1s; font-size: 1.2em; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .key:active { background: #3498db; color: white; border-color: #3498db; transform: scale(0.95); }
        .key.control { background: #95a5a6; color: white; border: none; }
        .key.control:active { background: #7f8c8d; }
        button#mainBtn { padding: 18px; font-size: 1.3em; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; width: 100%; color: white; background: #2ecc71; margin-top: 20px; box-shadow: 0 4px 10px rgba(46, 204, 113, 0.3); }
        .btn-show { background: #3498db !important; box-shadow: 0 4px 10px rgba(52, 152, 219, 0.3) !important; }
        .btn-next { background: #e67e22 !important; box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3) !important; }
        .clickable { background: #eef7ff !important; border-color: #3498db !important; }
    </style>
</head>
<body>
    <div class="card">
        <div id="stepLabel" class="step-label">音樂強化練習</div>
        <div id="instruction" class="instruction">點擊按鈕開始</div>
        <div id="questionArea" class="notes-display" onclick="handleReplay('Q')">準備就緒</div>
        
        <div class="input-container">
            <div class="input-slot" id="slot0"></div>
            <div class="input-slot" id="slot1"></div>
            <div class="input-slot" id="slot2"></div>
            <div class="input-slot" id="slot3"></div>
        </div>

        <div id="answerArea" class="ans-text" onclick="handleReplay('A')">正確答案</div>
        <div id="keyboard" class="keyboard" style="display: none;"></div>
        <button id="mainBtn" onclick="handleClick()">開始練習</button>
    </div>

<script>
    const solArr = ["Do", "Re", "Mi", "Fa", "Sol", "La", "Si"];
    const namArr = ["C", "D", "E", "F", "G", "A", "B"];
    const freqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];
    
    let notes = []; 
    let userInputs = [];
    let step = 1;
    let isAnsMode = false;
    let ctx = null;

    function play(offset) {
        try {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') ctx.resume();
            const now = ctx.currentTime;
            notes.forEach((idx, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freqs[(idx + offset) % 7], now + (i * 0.4));
                gain.gain.setValueAtTime(0.1, now + (i * 0.4));
                gain.gain.exponentialRampToValueAtTime(0.001, now + (i * 0.4) + 0.5);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(now + (i * 0.4)); osc.stop(now + (i * 0.4) + 0.5);
            });
        } catch(e) {}
    }

    function handleReplay(type) {
        if (notes.length === 0) return;
        if (type === 'Q') {
            if (step === 1) play(0);
            if (step === 4 || step === 5) play(step === 4 ? 1 : 2);
        } else if (type === 'A' && isAnsMode) {
            if (step === 3 || step === 4) play(step === 3 ? 1 : 2);
        }
    }

    // 洗牌算法 (Fisher-Yates Shuffle)
    function shuffleArray(array) {
        const newArr = [...array];
        for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
        }
        return newArr;
    }

    function renderKeyboard() {
        const kb = document.getElementById("keyboard");
        kb.style.display = "grid";
        kb.innerHTML = "";
        
        const isSol = (step === 3 || step === 4);
        const baseList = isSol ? solArr : namArr;
        
        // 對音符按鈕進行亂序處理
        const shuffledList = shuffleArray(baseList);

        shuffledList.forEach(val => {
            const k = document.createElement("div");
            k.className = "key";
            k.innerText = val;
            k.onclick = () => addInput(val);
            kb.appendChild(k);
        });

        // 「返回」與「清除」固定在最後
        const back = document.createElement("div");
        back.className = "key control";
        back.innerText = "Back";
        back.onclick = removeLast;
        kb.appendChild(back);

        const clear = document.createElement("div");
        clear.className = "key control";
        clear.innerText = "Clear";
        clear.onclick = clearAll;
        kb.appendChild(clear);
    }

    function addInput(val) {
        if (isAnsMode || userInputs.length >= 4) return;
        userInputs.push(val);
        updateSlots();
    }

    function removeLast() {
        if (isAnsMode) return;
        userInputs.pop();
        updateSlots();
    }

    function clearAll() {
        if (isAnsMode) return;
        userInputs = [];
        updateSlots();
    }

    function updateSlots() {
        for (let i = 0; i < 4; i++) {
            const slot = document.getElementById("slot" + i);
            slot.innerText = userInputs[i] || "";
            if (userInputs[i]) slot.classList.add("filled");
            else slot.classList.remove("filled");
        }
    }

    function renderQuestion() {
        const q = document.getElementById("questionArea");
        const a = document.getElementById("answerArea");
        const inst = document.getElementById("instruction");
        const btn = document.getElementById("mainBtn");
        const lab = document.getElementById("stepLabel");

        a.style.visibility = "hidden";
        isAnsMode = false;
        btn.innerText = "送出答案";
        btn.className = "btn-show";
        q.classList.remove("clickable");
        lab.innerText = "Step " + step;
        userInputs = [];
        updateSlots();
        renderKeyboard(); // 每次換題都會觸發亂序

        if (step === 1) {
            inst.innerText = "唱名 ➔ 音名 (Do ➔ C)";
            q.innerText = notes.map(i => solArr[i]).join(" "); q.classList.add("clickable");
        } else if (step === 2) {
            inst.innerText = "音名位移 (C ➔ D)";
            q.innerText = notes.map(i => namArr[i]).join(" ");
        } else if (step === 3) {
            inst.innerText = "音名 ➔ 唱名 (D ➔ Re)";
            q.innerText = notes.map(i => namArr[(i + 1) % 7]).join(" ");
        } else if (step === 4) {
            inst.innerText = "唱名位移 (Re ➔ Mi)";
            q.innerText = notes.map(i => solArr[(i + 1) % 7]).join(" "); q.classList.add("clickable");
        } else if (step === 5) {
            inst.innerText = "唱名 ➔ 音名 (Mi ➔ E)";
            q.innerText = notes.map(i => solArr[(i + 2) % 7]).join(" "); q.classList.add("clickable");
        }
    }

    function handleClick() {
        const a = document.getElementById("answerArea");
        const btn = document.getElementById("mainBtn");

        if (notes.length === 0) {
            let p = [0,1,2,3,4,5,6];
            while(notes.length < 4) notes.push(p.splice(Math.floor(Math.random()*p.length), 1)[0]);
            renderQuestion();
            play(0);
            return;
        }

        if (!isAnsMode) {
            isAnsMode = true;
            btn.innerText = "下一階段";
            btn.className = "btn-next";
            a.style.visibility = "visible";
            
            let correct = [];
            let offset = 0;

            if (step === 1) { correct = notes.map(i => namArr[i]); }
            else if (step === 2) { correct = notes.map(i => namArr[(i + 1) % 7]); }
            else if (step === 3) { correct = notes.map(i => solArr[(i + 1) % 7]); offset = 1; }
            else if (step === 4) { correct = notes.map(i => solArr[(i + 2) % 7]); offset = 2; }
            else if (step === 5) { correct = notes.map(i => namArr[(i + 2) % 7]); }

            a.innerText = "正解：" + correct.join(" ");
            if (offset > 0) { a.classList.add("clickable"); play(offset); }
            else { a.classList.remove("clickable"); }
        } else {
            if (step < 5) { step++; } 
            else { notes = notes.map(i => (i + 2) % 7); step = 2; }
            renderQuestion();
            if (step === 1) play(0);
        }
    }
</script>
</body>
</html>
