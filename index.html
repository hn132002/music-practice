<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>樂理無限接力練習器</title>
    <style>
        body { font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: #f0f4f8; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; }
        .step-label { color: #3498db; font-weight: bold; font-size: 1.2em; }
        .instruction { font-size: 1.1em; color: #555; margin: 15px 0; min-height: 1.5em; }
        .notes-display { font-size: 2.8em; font-weight: bold; margin: 20px 0; padding: 20px; background: #f9f9f9; border: 2px dashed #ddd; border-radius: 12px; min-height: 1.5em; cursor: pointer; }
        .ans-text { font-size: 2.2em; color: #27ae60; font-weight: bold; margin-bottom: 20px; min-height: 1.2em; cursor: pointer; }
        button { padding: 18px; font-size: 1.3em; cursor: pointer; border: none; border-radius: 12px; font-weight: bold; width: 100%; color: white; background: #2ecc71; transition: 0.2s; }
        .btn-show { background: #3498db !important; }
        .btn-next { background: #e67e22 !important; }
        .clickable { background: #eef7ff !important; border-color: #3498db !important; }
        .tip { font-size: 0.8em; color: #95a5a6; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div id="stepLabel" style="color:#3498db; font-weight:bold; font-size:1.2em;">音樂接力練習</div>
        <div id="instruction" style="margin:10px 0; color:#555;">點擊按鈕開始練習</div>
        <div id="questionArea" class="notes-display" onclick="handleReplay('Q')">準備就緒</div>
        <div id="answerArea" class="ans-text" onclick="handleReplay('A')"></div>
        <button id="mainBtn" onclick="handleClick()">開始練習</button>
        <div class="tip">🔊 唱名時可重複點擊聽音；音名保持靜音</div>
    </div>

<script>
    const solArr = ["Do", "Re", "Mi", "Fa", "Sol", "La", "Si"];
    const namArr = ["C", "D", "E", "F", "G", "A", "B"];
    const freqs = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88];
    
    let notes = []; 
    let step = 1;
    let isAnsMode = false;
    let ctx = null;

    function play(offset) {
        try {
            if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
            if (ctx.state === 'suspended') ctx.resume();
            const now = ctx.currentTime;
            notes.forEach((idx, i) => {
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(freqs[(idx + offset) % 7], now + (i * 0.4));
                gain.gain.setValueAtTime(0.1, now + (i * 0.4));
                gain.gain.exponentialRampToValueAtTime(0.001, now + (i * 0.4) + 0.5);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(now + (i * 0.4)); osc.stop(now + (i * 0.4) + 0.5);
            });
        } catch(e) {}
    }

    function handleReplay(type) {
        if (notes.length === 0) return;
        if (type === 'Q') {
            if (step === 1) play(0);
            if (step === 4 || step === 5) play(step === 4 ? 1 : 2);
        } else if (type === 'A' && isAnsMode) {
            if (step === 3) play(1);
            if (step === 4) play(2);
        }
    }

    function renderQuestion() {
        const q = document.getElementById("questionArea");
        const a = document.getElementById("answerArea");
        const inst = document.getElementById("instruction");
        const btn = document.getElementById("mainBtn");
        const lab = document.getElementById("stepLabel");

        a.innerText = "";
        isAnsMode = false;
        btn.innerText = "顯示答案";
        btn.className = "btn-show";
        q.classList.remove("clickable");
        a.classList.remove("clickable");
        lab.innerText = "第 " + step + " 步";

        if (step === 1) {
            inst.innerText = "唱名 ➔ 音名 (基礎轉換)";
            q.innerText = notes.map(i => solArr[i]).join(" "); q.classList.add("clickable");
        } else if (step === 2) {
            inst.innerText = "音名 ➔ 下一個音名 (位移練習)";
            q.innerText = notes.map(i => namArr[i]).join(" ");
        } else if (step === 3) {
            inst.innerText = "音名 ➔ 唱名 (轉換練習)";
            q.innerText = notes.map(i => namArr[(i + 1) % 7]).join(" ");
        } else if (step === 4) {
            inst.innerText = "唱名 ➔ 下一個唱名 (位移練習)";
            q.innerText = solArr[(notes[0]+1)%7] + " " + solArr[(notes[1]+1)%7] + " " + solArr[(notes[2]+1)%7] + " " + solArr[(notes[3]+1)%7];
            q.classList.add("clickable");
        } else if (step === 5) {
            inst.innerText = "唱名 ➔ 音名 (轉換練習)";
            q.innerText = solArr[(notes[0]+2)%7] + " " + solArr[(notes[1]+2)%7] + " " + solArr[(notes[2]+2)%7] + " " + solArr[(notes[3]+2)%7];
            q.classList.add("clickable");
        }
    }

    function handleClick() {
        const a = document.getElementById("answerArea");
        const btn = document.getElementById("mainBtn");

        if (notes.length === 0) {
            let p = [0,1,2,3,4,5,6];
            while(notes.length < 4) notes.push(p.splice(Math.floor(Math.random()*p.length), 1)[0]);
            renderQuestion();
            play(0);
            return;
        }

        if (!isAnsMode) {
            isAnsMode = true;
            btn.innerText = "下一步驟";
            btn.className = "btn-next";
            
            if (step === 1) { a.innerText = notes.map(i => namArr[i]).join(" "); }
            else if (step === 2) { a.innerText = notes.map(i => namArr[(i + 1) % 7]).join(" "); }
            else if (step === 3) { a.innerText = notes.map(i => solArr[(i + 1) % 7]).join(" "); a.classList.add("clickable"); play(1); }
            else if (step === 4) { a.innerText = notes.map(i => solArr[(i + 2) % 7]).join(" "); a.classList.add("clickable"); play(2); }
            else if (step === 5) { a.innerText = notes.map(i => namArr[(i + 2) % 7]).join(" "); }
        } else {
            if (step < 5) {
                step++;
            } else {
                // 接力邏輯：第五步結束後，將基底音推移 2 格，回到 Step 2
                notes = notes.map(i => (i + 2) % 7);
                step = 2;
            }
            renderQuestion();
            // 只有回到 Step 1 (啟動時) 會自動出題播音，其餘位移步驟遵循您的靜音規則
        }
    }
</script>
</body>
</html>
