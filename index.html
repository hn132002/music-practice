<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>橙色的樂理強化 v4.2.1</title>
    <style>
        :root { --primary: #3498db; --success: #2ecc71; --error: #e74c3c; --bg: #f0f4f8; }
        body { font-family: -apple-system, system-ui, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; background: var(--bg); margin: 0; min-height: 100vh; overflow-x: hidden; }
        
        /* 靈魂漂浮動畫 */
        .soul-note { position: fixed; pointer-events: none; font-weight: 900; color: var(--primary); opacity: 0; font-size: 1.5rem; z-index: 100; user-select: none; animation: soulFloatAnim 2s ease-out forwards; }
        @keyframes soulFloatAnim { 0% { transform: translateY(0) scale(1); opacity: 0.3; } 100% { transform: translateY(-120px) scale(1.5); opacity: 0; } }

        .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); text-align: center; max-width: 500px; width: 100%; position: relative; z-index: 10; }
        .top-nav { position: absolute; top: 15px; width: calc(100% - 40px); display: flex; justify-content: space-between; padding: 0 5px; z-index: 10; }
        .nav-item { cursor: pointer; font-size: 1.3em; filter: grayscale(0.3); transition: 0.2s; text-decoration: none; color: #333; }
        .app-title { color: var(--primary); margin: 0; font-size: 1.4em; font-weight: 900; }
        
        .timer-group { margin-bottom: 12px; }
        .session-timer { background: #eef2f7; color: #34495e; padding: 6px 15px; border-radius: 20px; font-size: 0.9em; font-weight: bold; font-family: 'Courier New', monospace; display: inline-block; border: 1px solid #dcdde1; box-shadow: inset 0 1px 3px rgba(0,0,0,0.05); }
        .base-status { font-size: 0.75em; color: #e67e22; font-weight: bold; margin-top: 5px; height: 1.2em; letter-spacing: 1px; }

        .info-panel { background: #f8f9fa; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: left; display: none; font-size: 0.85em; border: 1px solid #ddd; max-height: 70vh; overflow-y: auto; }
        .setting-group { margin-bottom: 12px; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        .group-title { font-weight: 800; color: var(--primary); display: block; margin-bottom: 8px; font-size: 1.1em; }
        .setting-item { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
        
        /* 級數選擇器 */
        .degree-picker { display: flex; justify-content: space-between; gap: 4px; margin-top: 5px; width: 100%; flex-wrap: wrap; }
        .deg-btn { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; color: #95a5a6; transition: 0.2s; font-size: 0.85em; background: #fff; }
        .deg-btn.active { border-color: var(--success); color: #fff; background: var(--success); box-shadow: 0 2px 5px rgba(46, 204, 113, 0.3); }

        .timer-bar-container { width: 100%; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; margin-bottom: 10px; display: none; }
        #timerBar { height: 100%; background: var(--error); width: 100%; transition: width linear; }
        
        .quiz-container { background: #f9f9f9; border-radius: 20px; padding: 20px; margin: 10px 0; border: 2px solid #eee; min-height: 150px; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .instruction { font-size: 1.4em; font-weight: 900; color: #34495e; margin-bottom: 10px; line-height: 1.6; letter-spacing: 1px; }
        .mode-hint { font-size: 0.95em; color: var(--primary); font-weight: bold; margin-top: 10px; display: inline-block; background: #eef7ff; padding: 5px 15px; border-radius: 12px; border: 1px solid #d6eaff; }
        .sprint-text { color: var(--error); animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .notes-display, .input-container { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-bottom: 15px; width: 100%; }
        .note-q-item { width: 45px; font-size: 1.8em; font-weight: bold; color: #2c3e50; text-align: center; cursor: pointer; }
        .input-slot { width: 45px; height: 45px; border-bottom: 3px solid #bdc3c7; font-size: 1.2em; font-weight: bold; display: flex; align-items: center; justify-content: center; position: relative; }
        
        .slot-correct { color: var(--success) !important; border-bottom-color: var(--success) !important; }
        .slot-wrong { color: var(--error) !important; border-bottom-color: var(--error) !important; }
        
        .keyboard { display: grid; gap: 8px; margin-top: 15px; width: 100%; }
        .kb-standard { grid-template-columns: repeat(7, 1fr); }
        .kb-harmonica { grid-template-columns: repeat(4, 1fr); }
        
        .key { padding: 15px 0; background: #fff; border-radius: 12px; font-weight: bold; cursor: pointer; border: 1px solid #dcdde1; box-shadow: 0 4px 0 #eee; font-size: 0.9em; -webkit-tap-highlight-color: transparent; }
        .key.hint-correct { background: var(--success) !important; color: white !important; }
        .key.control { background: #95a5a6; color: white; grid-column: 1 / -1; margin-top: 4px; padding: 10px 0; font-size: 1.2em; }
        
        #mainBtn { padding: 16px; font-size: 1.2em; cursor: pointer; border: none; border-radius: 14px; font-weight: bold; width: 100%; color: white; background: var(--success); margin-top: 15px; box-shadow: 0 4px 0 #27ae60; outline: none; }
        .ans-text { margin-top: 8px; font-weight: bold; color: #7f8c8d; height: 1.2em; visibility: hidden; cursor: pointer; transition: color 0.2s; }
        
        .footer { margin-top: 30px; border-top: 1px solid #eee; padding-top: 15px; color: #95a5a6; font-size: 0.8em; text-align: center; }
        .changelog { margin-top: 10px; text-align: left; background: #f9f9f9; padding: 12px; border-radius: 10px; font-size: 0.85em; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="card">
        <div class="top-nav">
            <div class="nav-item" onclick="togglePanel('pianoPanel')">🎹</div>
            <div style="display: flex; gap: 15px;">
                <a href="#" class="nav-item">🏠</a>
                <div class="nav-item" onclick="togglePanel('settingsPanel')">⚙️</div>
            </div>
        </div>

        <h1 class="app-title">橙色的樂理強化</h1>
        <div class="version-tag">Version 4.2.1</div>
        
        <div class="timer-group">
            <div id="sessionTimer" class="session-timer">Practice Time: 00:00</div>
            <div id="baseStatus" class="base-status"></div>
        </div>

        <div id="pianoPanel" class="info-panel">
            <span class="group-title">📚 樂理參考</span>
            <div id="refList" style="display:flex; justify-content:space-between; margin-top:5px; text-align:center;"></div>
        </div>

        <div id="settingsPanel" class="info-panel">
            <div class="setting-group">
                <span class="group-title">核心訓練</span>
                <div class="setting-item">
                    <label>訓練模式</label>
                    <select id="trainMode" onchange="updateModeUI()">
                        <option value="map_ns" selected>音名 ↔ 唱名</option>
                        <option value="map_nn">音名 ↔ 簡譜</option>
                        <option value="map_sn">唱名 ↔ 簡譜</option>
                        <option value="cycle">三向循環</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>鍵盤排列模式</label>
                    <select id="layoutMode" onchange="renderKeyboard()">
                        <option value="standard" selected>鋼琴標準 (1x7)</option>
                        <option value="harmonica">口琴實體 (4x2)</option>
                    </select>
                </div>
                <div class="setting-item" style="flex-direction: column; align-items: flex-start;">
                    <label style="margin-bottom: 8px;">出題級數範圍 (點擊切換)</label>
                    <div class="degree-picker">
                        <div class="deg-btn active" id="deg0" onclick="this.classList.toggle('active')">1</div>
                        <div class="deg-btn active" id="deg1" onclick="this.classList.toggle('active')">2</div>
                        <div class="deg-btn active" id="deg2" onclick="this.classList.toggle('active')">3</div>
                        <div class="deg-btn active" id="deg3" onclick="this.classList.toggle('active')">4</div>
                        <div class="deg-btn active" id="deg4" onclick="this.classList.toggle('active')">5</div>
                        <div class="deg-btn active" id="deg5" onclick="this.classList.toggle('active')">6</div>
                        <div class="deg-btn active" id="deg6" onclick="this.classList.toggle('active')">7</div>
                        <div class="deg-btn active" id="deg7" onclick="this.classList.toggle('active')">1(高)</div>
                    </div>
                </div>
                <div class="setting-item"><label>音符數量</label><input type="number" id="noteCount" value="4" min="1" max="14" style="width:45px"></div>
                <div class="setting-item"><label>基準調性</label>
                    <select id="baseRoot" onchange="updateStatusDisplay()">
                        <option value="0" selected>C</option><option value="2">D</option><option value="4">E</option><option value="5">F</option><option value="7">G</option><option value="9">A</option><option value="11">B</option>
                    </select>
                </div>
            </div>
            
            <div class="setting-group">
                <span class="group-title">強度與聲音</span>
                <div class="setting-item"><label>計時模式</label>
                    <select id="timerMode" onchange="updateModeUI()">
                        <option value="off" selected>關閉</option><option value="always">每題計時</option><option value="sprint">隨機衝刺</option>
                    </select>
                </div>
                <div id="sprintNGroup" class="setting-item" style="display:none;"><label>衝刺頻率 (1/N)</label><input type="number" id="sprintN" value="3" min="1" style="width:45px"></div>
                <div class="setting-item"><label>倒數秒數</label><input type="number" id="timerSec" value="10" min="3" style="width:45px"></div>
                <div class="setting-item"><label>鍵盤亂序</label><input type="checkbox" id="kbRandom" onchange="renderKeyboard()"></div>
                <div class="setting-item"><label>作答播放聲音</label><input type="checkbox" id="playAnsSound" checked></div>
                <div class="setting-item"><label>唱名(5) 標記</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="radio" name="solType" id="solTypeSol" checked onchange="updateSolType()"> <label for="solTypeSol">Sol</label>
                        <input type="radio" name="solType" id="solTypeSo" onchange="updateSolType()"> <label for="solTypeSo">So</label>
                    </div>
                </div>
            </div>

            <button onclick="applySettings()" style="width:100%; padding:12px; background:var(--success); color:white; border:none; border-radius:10px; font-weight:bold;">完成設定</button>
        </div>

        <div class="timer-bar-container" id="timerBarCont"><div id="timerBar"></div></div>

        <div class="quiz-container">
            <div id="instruction" class="instruction">點擊下方綠色按鈕開始</div>
            <div id="questionArea" class="notes-display"></div>
            <div class="input-container" id="slotContainer"></div>
        </div>
        <div id="answerArea" class="ans-text" onclick="handleReplay()">正解：--</div>
        
        <div id="keyboard" class="keyboard kb-standard"></div>
        <button id="mainBtn" onclick="handleClick()">開始練習</button>

        <footer class="footer">
            <p>Made with ❤️ by <strong>EtOH58daidai</strong> & <strong>Gemini</strong></p>
            <details class="changelog">
                <summary>📜 更新日誌 v4.2.1</summary>
                <ul>
                    <li>完全基於 v4.1.2 穩定版重構。</li>
                    <li>新增「鍵盤排列模式」切換：鋼琴(1x7) 與 口琴實體(4x2)。</li>
                    <li>口琴排列上排 CEGC，下排 DFAB；最後一格為 C5 高音。</li>
                    <li>級數過濾器全天候開啟，支援 1~7 及 高音 1。</li>
                </ul>
            </details>
        </footer>
    </div>

<script>
    let solArr = ["Do", "Re", "Mi", "Fa", "Sol", "La", "Si", "Do"];
    const namArr = ["C", "D", "E", "F", "G", "A", "B", "C"];
    const numArr = ["1", "2", "3", "4", "5", "6", "7", "1"];
    const INTERVALS = [0, 2, 4, 5, 7, 9, 11, 12];
    const HARM_INDEX_MAP = [0, 2, 4, 7, 1, 3, 5, 6]; 

    let state = { notes: [], userInputs: [], stepIdx: 0, isAnsMode: false, ctx: null, timerInt: null, sessionStartTime: null, sessionTimerInt: null, questionCounter: 0, isCurrentSprint: false };
    const MODE_STEPS = { map_ns: [10, 11], map_nn: [30, 31], map_sn: [40, 41], cycle: [50, 51, 52] };

    window.onload = () => { renderRefList(); updateModeUI(); renderKeyboard(); updateStatusDisplay(); };

    function getSelectedPool() {
        let pool = [];
        for (let i = 0; i < 8; i++) {
            if (document.getElementById(`deg${i}`).classList.contains('active')) pool.push(i);
        }
        return pool.length > 0 ? pool : [0, 1, 2, 3, 4, 5, 6, 7];
    }

    function triggerSoulFloat(correctSymbols) {
        state.notes.forEach((_, i) => {
            const slot = document.getElementById("slot" + i); if (!slot) return;
            const rect = slot.getBoundingClientRect();
            const soul = document.createElement("div"); soul.className = "soul-note"; soul.innerText = correctSymbols[i];
            soul.style.left = (rect.left + rect.width / 2 - 10) + "px"; soul.style.top = (rect.top - 10) + "px";
            document.body.appendChild(soul);
            setTimeout(() => soul.remove(), 2000);
        });
    }

    function updateSolType() {
        solArr[4] = document.getElementById("solTypeSo").checked ? "So" : "Sol";
        solArr[7] = solArr[0]; 
        renderRefList(); renderKeyboard();
        if (state.notes.length > 0) renderStep();
    }

    function renderRefList() {
        const ref = document.getElementById("refList"); if (!ref) return;
        ref.innerHTML = "";
        for(let i=0; i<7; i++) { ref.innerHTML += `<div style="font-size:0.8em"><b>${namArr[i]}</b><br>${solArr[i]}</div>`; }
    }

    function updateStatusDisplay() {
        const rootSelect = document.getElementById("baseRoot"), statusEl = document.getElementById("baseStatus");
        statusEl.innerText = `[ ${rootSelect.options[rootSelect.selectedIndex].text} 大調 · 標準音域 ]`;
    }

    function togglePanel(id) { const p = document.getElementById(id); const isShow = (p.style.display === "block"); document.querySelectorAll('.info-panel').forEach(el => el.style.display = 'none'); p.style.display = isShow ? 'none' : 'block'; }
    
    function updateModeUI() { 
        document.getElementById("sprintNGroup").style.display = (document.getElementById("timerMode").value === 'sprint') ? 'flex' : 'none';
        if (state.notes.length === 0) {
            const modeSelect = document.getElementById("trainMode");
            document.getElementById("instruction").innerHTML = `點擊下方綠色按鈕開始<br><span class="mode-hint">目前模式：${modeSelect.options[modeSelect.selectedIndex].text}</span>`;
        }
        renderKeyboard();
    }

    function applySettings() {
        clearInterval(state.timerInt); clearInterval(state.sessionTimerInt);
        state.timerInt = state.sessionTimerInt = state.sessionStartTime = null;
        state.notes = []; state.stepIdx = 0; state.isAnsMode = false;
        document.getElementById("sessionTimer").innerText = "Practice Time: 00:00";
        document.getElementById("timerBarCont").style.display = "none";
        document.getElementById("answerArea").style.visibility = "hidden";
        const bar = document.getElementById("timerBar"); if (bar) { bar.style.transition = 'none'; bar.style.width = '100%'; }
        document.getElementById("settingsPanel").style.display = "none";
        updateModeUI(); updateStatusDisplay();
    }

    function ensureSessionTimer() { 
        if (!state.sessionStartTime) { 
            state.sessionStartTime = Date.now(); 
            state.sessionTimerInt = setInterval(() => { 
                const diff = Math.floor((Date.now() - state.sessionStartTime) / 1000); 
                const mm = String(Math.floor(diff / 60)).padStart(2, '0'), ss = String(diff % 60).padStart(2, '0'); 
                document.getElementById("sessionTimer").innerText = `Practice Time: ${mm}:${ss}`; 
            }, 1000); 
        } 
    }

    function playNotes(targetIndices) {
        if (!state.ctx) state.ctx = new AudioContext();
        if (state.ctx.state === 'suspended') state.ctx.resume();
        const now = state.ctx.currentTime, rootOffset = parseInt(document.getElementById("baseRoot").value);
        targetIndices.forEach((idx, i) => {
            const osc = state.ctx.createOscillator(), gain = state.ctx.createGain();
            const freq = 261.63 * Math.pow(2, (rootOffset + INTERVALS[idx]) / 12);
            osc.frequency.setValueAtTime(freq, now + i * 0.4); 
            gain.gain.setValueAtTime(0, now + i * 0.4); gain.gain.linearRampToValueAtTime(0.1, now + i * 0.4 + 0.01); gain.gain.exponentialRampToValueAtTime(0.001, now + i * 0.4 + 0.5);
            osc.connect(gain); gain.connect(state.ctx.destination); osc.start(now + i * 0.4); osc.stop(now + i * 0.4 + 0.6);
        });
    }

    function handleClick() {
        ensureSessionTimer(); const steps = MODE_STEPS[document.getElementById("trainMode").value];
        if (state.notes.length === 0) { generateNewTask(); return; }
        if (!state.isAnsMode) {
            state.isAnsMode = true; clearInterval(state.timerInt);
            const bar = document.getElementById("timerBar"); if (bar) { bar.style.transition = 'none'; bar.style.width = window.getComputedStyle(bar).width; }
            const sid = steps[state.stepIdx]; let correct = [];
            const isSol = (sid === 10 || sid === 41 || sid === 51), isNum = (sid === 30 || sid === 40 || sid === 50);
            correct = state.notes.map(n => isSol ? solArr[n] : (isNum ? numArr[n] : namArr[n]));
            triggerSoulFloat(correct);
            state.notes.forEach((_, i) => { 
                const s = document.getElementById("slot" + i); 
                if (state.userInputs[i] === correct[i]) s.classList.add("slot-correct"); 
                else { s.classList.add("slot-wrong"); s.innerText = state.userInputs[i] || "X"; }
            });
            playNotes(state.notes);
            document.getElementById("answerArea").innerText = "正解：" + correct.join(" "); 
            document.getElementById("answerArea").style.visibility = "visible"; document.getElementById("mainBtn").innerText = "下一步驟";
        } else {
            state.stepIdx++; if (state.stepIdx >= steps.length) generateNewTask(); else renderStep();
        }
    }

    function generateNewTask() {
        state.stepIdx = 0; state.isAnsMode = false;
        const count = parseInt(document.getElementById("noteCount").value) || 4; 
        state.notes = []; let pool = getSelectedPool(); 
        const n = parseInt(document.getElementById("sprintN").value);
        state.isCurrentSprint = (Math.random() < (1 / n));
        for(let i=0; i<count; i++) { if (pool.length === 0) pool = getSelectedPool(); const pickIdx = Math.floor(Math.random()*pool.length); state.notes.push(pool.splice(pickIdx, 1)[0]); }
        renderStep();
    }

    function renderStep() {
        const sid = MODE_STEPS[document.getElementById("trainMode").value][state.stepIdx];
        state.isAnsMode = false; state.userInputs = []; const sCont = document.getElementById("slotContainer"), qArea = document.getElementById("questionArea");
        document.getElementById("answerArea").style.visibility = "hidden"; sCont.innerHTML = ""; qArea.innerHTML = "";
        state.notes.forEach((nIdx, i) => {
            const qText = (sid%10 === 0) ? namArr[nIdx] : (sid%10 === 1 ? solArr[nIdx] : numArr[nIdx]);
            qArea.innerHTML += `<div class="note-q-item" onclick="playNotes([${nIdx}])">${qText}</div>`;
            sCont.innerHTML += `<div class="input-slot" id="slot${i}"></div>`;
        });
        const isSprintActive = (document.getElementById("timerMode").value === 'sprint' && state.isCurrentSprint);
        document.getElementById("instruction").innerHTML = "樂理轉換練習" + (isSprintActive ? ' <br><span class="sprint-text">🔥 隨機衝刺！</span>' : '');
        renderKeyboard(); startTimer(); document.getElementById("mainBtn").innerText = "檢查答案";
    }

    function startTimer() {
        clearInterval(state.timerInt); const mode = document.getElementById("timerMode").value, bar = document.getElementById("timerBar"), cont = document.getElementById("timerBarCont");
        if (mode === 'off' || (mode === 'sprint' && !state.isCurrentSprint)) { cont.style.display = "none"; return; }
        bar.style.transition = "none"; bar.style.width = "100%"; cont.style.display = "block";
        const sec = parseInt(document.getElementById("timerSec").value);
        setTimeout(() => { bar.style.transition = `width ${sec}s linear`; bar.style.width = "0%"; }, 50);
        state.timerInt = setInterval(() => { if (!state.isAnsMode) handleClick(); }, sec * 1000);
    }

    function renderKeyboard() {
        const kb = document.getElementById("keyboard"), layout = document.getElementById("layoutMode").value;
        const sid = MODE_STEPS[document.getElementById("trainMode").value][state.stepIdx];
        const isSol = (sid === 10 || sid === 41 || sid === 51), isNum = (sid === 30 || sid === 40 || sid === 50);
        const pool = getSelectedPool();
        
        kb.innerHTML = ""; kb.className = layout === 'harmonica' ? "keyboard kb-harmonica" : "keyboard kb-standard";
        
        let keys = [];
        if (layout === 'harmonica') {
            HARM_INDEX_MAP.forEach(idx => {
                if (pool.includes(idx)) keys.push({ text: isSol ? solArr[idx] : (isNum ? numArr[idx] : namArr[idx]), idx: idx });
                else keys.push({ text: "", idx: -1 }); // 空位維持結構
            });
        } else {
            for(let i=0; i<7; i++) {
                if (pool.includes(i)) keys.push({ text: isSol ? solArr[i] : (isNum ? numArr[i] : namArr[i]), idx: i });
            }
            if (document.getElementById("kbRandom").checked) keys.sort(() => Math.random() - 0.5);
        }

        keys.forEach(kObj => { 
            const k = document.createElement("div"); k.className = "key"; k.innerText = kObj.text; 
            if (kObj.idx === -1) k.style.visibility = "hidden";
            k.onclick = () => { 
                if (!state.isAnsMode && kObj.idx !== -1 && state.userInputs.length < state.notes.length) { 
                    state.userInputs.push(kObj.text); 
                    state.notes.forEach((_, i) => document.getElementById("slot" + i).innerText = state.userInputs[i] || "");
                    if (document.getElementById("playAnsSound").checked) playNotes([kObj.idx]);
                }
            }; kb.appendChild(k); 
        });
        const del = document.createElement("div"); del.className = "key control"; del.innerText = "⌫"; del.onclick = () => { if(!state.isAnsMode) { state.userInputs.pop(); state.notes.forEach((_, i) => document.getElementById("slot" + i).innerText = state.userInputs[i] || ""); }}; kb.appendChild(del);
    }
    function handleReplay() { playNotes(state.notes); }
</script>
</body>
</html>
